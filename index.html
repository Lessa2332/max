<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GEO MATH AR | 2026</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* Прогрес-бар */
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: rgba(0,255,255,0.1); z-index: 150; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #00ff88); box-shadow: 0 0 20px #00f2ff; transition: width 0.4s; }

        #ui { position: absolute; bottom: 40px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        #status {
            background: rgba(0, 20, 20, 0.8); padding: 25px; border-radius: 30px;
            color: #00ffff; font-weight: 800; border: 2px solid #00ffff;
            text-align: center; width: 85%; max-width: 500px;
            font-size: 1.5rem; backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
        }

        #start-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #btn-start { background: #00ffff; color: #000; padding: 25px 50px; border-radius: 20px; font-weight: 900; border: none; cursor: pointer; font-size: 1.8rem; text-transform: uppercase; }
        
        /* Мітка розпізнаного числа над рукою */
        #hand-value {
            position: absolute; color: #fff; background: #ff0055; 
            padding: 10px 20px; border-radius: 15px; font-size: 2rem; 
            font-weight: 900; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="hand-value">0</div>

    <div id="start-screen">
        <h1 style="color:#00ffff; margin-bottom:20px;">GEO MATH AR</h1>
        <button id="btn-start">ПОЧАТИ КВЕСТ</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="status">Завантаження квантового модуля...</div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const handValDiv = document.getElementById('hand-value');

        let handLandmarker, scene, camera, renderer, masterGroup, ring;
        let currentTarget = 1;
        let score = 0;
        let isProcessing = false;
        let lastSmoothCount = 0;
        let countBuffer = [];

        // --- Логіка навчання ---
        const lessons = [
            { num: 1, word: "Один", msg: "Покажи один пальчик. Це як висока вежа!" },
            { num: 2, word: "Два", msg: "Тепер покажи два. Як вушка у зайчика! 🐰" },
            { num: 3, word: "Три", msg: "Чудово! А зможеш показати три?" },
            { num: 4, word: "Чотири", msg: "Ого! Чотири пальчики - це вже ціла команда." },
            { num: 5, word: "П'ять", msg: "Дай мені п'ять! Покажи всю долоньку! ✋" }
        ];

        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'uk-UA';
            u.rate = 1.0;
            u.onend = callback;
            window.speechSynthesis.speak(u);
        }

        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            startLesson();
        }

        function startLesson() {
            if (score >= lessons.length) {
                statusDiv.innerText = "МІСІЯ ВИКОНАНА! ТИ МАЙСТЕР ЛІЧБИ! 🏆";
                speak("Вітаю! Ти вивчив усі числа. Ти справжній математичний геній!");
                return;
            }

            const lesson = lessons[score];
            currentTarget = lesson.num;
            statusDiv.innerText = `ПОКАЖИ: ${lesson.num}`;
            speak(lesson.msg);
            isProcessing = false;
        }

        // --- Three.js AR елементи ---
        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            masterGroup = new THREE.Group();
            
            // Неонове кільце
            ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.4, 0.02, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 })
            );
            masterGroup.add(ring);
            
            scene.add(masterGroup);
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            camera.position.z = 3;
            animate();
        }

        function countFingers(landmarks) {
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            let count = 0;
            
            // Чотири пальці
            tips.forEach((tip, i) => {
                if (landmarks[tip].y < landmarks[pips[i]].y) count++;
            });
            
            // Великий палець (спрощена логіка по горизонталі)
            const thumbTip = landmarks[4];
            const thumbBase = landmarks[17];
            if (Math.abs(thumbTip.x - thumbBase.x) > 0.15) count++;
            
            return count;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                
                if (res.landmarks?.[0]) {
                    const hand = res.landmarks[0];
                    const currentCount = countFingers(hand);
                    
                    // Стабілізація розпізнавання (буфер)
                    countBuffer.push(currentCount);
                    if (countBuffer.length > 10) countBuffer.shift();
                    const smoothCount = Math.round(countBuffer.reduce((a, b) => a + b) / countBuffer.length);

                    // Візуалізація AR-кільця за рукою
                    const wrist = hand[0];
                    masterGroup.position.x = (0.5 - wrist.x) * 4;
                    masterGroup.position.y = (0.5 - wrist.y) * 3;
                    masterGroup.visible = true;
                    ring.rotation.y += 0.05;

                    // Мітка з цифрою
                    handValDiv.style.display = 'block';
                    handValDiv.style.left = `${(1 - wrist.x) * 100}%`;
                    handValDiv.style.top = `${wrist.y * 100}%`;
                    handValDiv.innerText = smoothCount;

                    // Перевірка відповіді
                    if (!isProcessing && smoothCount === currentTarget) {
                        isProcessing = true;
                        handleSuccess();
                    }
                } else {
                    masterGroup.visible = false;
                    handValDiv.style.display = 'none';
                }
            }
            renderer.render(scene, camera);
        }

        function handleSuccess() {
            ring.material.color.setHex(0x00ff88);
            ring.material.emissive.setHex(0x00ff88);
            
            speak(`Правильно! Це число ${lessons[score].word}. Ти молодець!`, () => {
                score++;
                progressBar.style.width = `${(score / lessons.length) * 100}%`;
                
                setTimeout(() => {
                    ring.material.color.setHex(0x00ffff);
                    ring.material.emissive.setHex(0x00ffff);
                    startLesson();
                }, 1000);
            });
        }

        document.getElementById('btn-start').onclick = async () => {
            document.getElementById('start-screen').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            setupScene();
            await initAI();
        };
    </script>
</body>
</html>
