<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎈 Пальчикова лічба до 5</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #ffd6e0, #c7f9ff, #fff5ba);
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
      overflow: hidden;
      height: 100vh;
      user-select: none;
      touch-action: manipulation;
    }
    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 10px;
    }
    #video-wrapper {
      position: relative;
      width: 90vw;
      max-width: 500px;
      aspect-ratio: 4/3;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      background: #000;
      margin: 10px 0;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .target-number {
      font-size: 8rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 20px #ff6b6b, 0 0 40px #feca57;
      background: rgba(0,0,0,0.4);
      border-radius: 50%;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .detected-count {
      font-size: 3rem;
      color: #ffeaa7;
      text-shadow: 2px 2px 0 #d63031;
      background: rgba(0,0,0,0.5);
      padding: 5px 20px;
      border-radius: 30px;
    }
    #ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
    }
    .progress-area {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.8rem;
      background: rgba(255,255,255,0.8);
      padding: 10px 20px;
      border-radius: 40px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .attempts-left {
      font-weight: bold;
      color: #e17055;
    }
    .score-display {
      font-size: 2rem;
      background: #fff;
      border-radius: 20px;
      padding: 5px 15px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }
    .message {
      font-size: 2rem;
      text-align: center;
      background: rgba(255,255,255,0.85);
      padding: 10px 25px;
      border-radius: 20px;
      margin-top: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      color: #2d3436;
    }
    #fireworks-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1000;
    }
    button {
      font-size: 2rem;
      padding: 15px 30px;
      background: #fd79a8;
      color: white;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    button:active { transform: scale(0.95); }
    @media (max-width: 500px) {
      .target-number { font-size: 5rem; width: 90px; height: 90px; }
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="video-wrapper">
      <video id="video" autoplay playsinline></video>
      <div id="overlay">
        <div class="target-number" id="targetDisplay">?</div>
        <div class="detected-count" id="detectedDisplay">🙌 0</div>
      </div>
    </div>
    <div id="ui">
      <div class="progress-area">
        <span>⭐ <span id="scoreSpan">0</span> / 10</span>
        <span> | </span>
        <span>🎯 Залишилось: <span class="attempts-left" id="attemptsLeft">10</span></span>
      </div>
      <div class="message" id="messageBox">👋 Помахай ручкою!</div>
    </div>
  </div>
  <canvas id="fireworks-canvas"></canvas>

  <!-- MediaPipe Hand Landmarker -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/hand_landmarker/hand_landmarker.js"
          crossorigin="anonymous"></script>

  <script>
    (function() {
      // ----- DOM elements -----
      const video = document.getElementById('video');
      const targetDisplay = document.getElementById('targetDisplay');
      const detectedDisplay = document.getElementById('detectedDisplay');
      const scoreSpan = document.getElementById('scoreSpan');
      const attemptsLeftSpan = document.getElementById('attemptsLeft');
      const messageBox = document.getElementById('messageBox');
      const fireworksCanvas = document.getElementById('fireworks-canvas');
      const ctxFW = fireworksCanvas.getContext('2d');

      // ----- Game state -----
      const MAX_ATTEMPTS = 10;
      let attempts = 0;
      let score = 0;
      let targetNumber = 0;
      let gameActive = false;
      let roundInProgress = false;
      let evaluationTimer = null;
      let handLandmarker = null;
      let lastDetectedCount = 0;
      let smoothedCount = 0;
      let countBuffer = [];
      const BUFFER_SIZE = 5;

      // ----- Audio context for sounds -----
      let audioCtx = null;
      function getAudioContext() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
      }

      function playTone(freq, duration, type = 'sine', gain = 0.3) {
        const ctx = getAudioContext();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(gain, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration);
      }

      function playSuccessSound() {
        playTone(523, 0.15, 'sine', 0.3);
        setTimeout(() => playTone(659, 0.15, 'sine', 0.3), 150);
        setTimeout(() => playTone(784, 0.25, 'sine', 0.4), 300);
      }

      function playErrorSound() {
        playTone(200, 0.2, 'triangle', 0.3);
        setTimeout(() => playTone(180, 0.25, 'triangle', 0.2), 200);
      }

      function playStartSound() {
        playTone(400, 0.1, 'sine', 0.2);
        setTimeout(() => playTone(500, 0.15, 'sine', 0.25), 100);
      }

      // ----- Fireworks animation -----
      let fireworksActive = false;
      let particles = [];
      let fireworksRAF = null;

      function createFireworks() {
        fireworksActive = true;
        const centerX = fireworksCanvas.width / 2;
        const centerY = fireworksCanvas.height / 2;
        for (let i = 0; i < 30; i++) {
          particles.push({
            x: centerX,
            y: centerY,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8 - 2,
            life: 1,
            color: `hsl(${Math.random() * 360}, 100%, 70%)`,
            size: Math.random() * 6 + 2
          });
        }
        if (!fireworksRAF) animateFireworks();
      }

      function animateFireworks() {
        if (!fireworksActive && particles.length === 0) {
          fireworksRAF = null;
          return;
        }
        ctxFW.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1; // gravity
          p.life -= 0.02;
          ctxFW.globalAlpha = p.life;
          ctxFW.fillStyle = p.color;
          ctxFW.beginPath();
          ctxFW.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctxFW.fill();
        });
        ctxFW.globalAlpha = 1;
        if (particles.length > 0 || fireworksActive) {
          fireworksRAF = requestAnimationFrame(animateFireworks);
        } else {
          fireworksRAF = null;
          fireworksActive = false;
        }
      }

      function stopFireworks() {
        fireworksActive = false;
        // particles will fade out via existing animation
      }

      function resizeFireworksCanvas() {
        fireworksCanvas.width = window.innerWidth;
        fireworksCanvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeFireworksCanvas);
      resizeFireworksCanvas();

      // ----- Speech synthesis (Ukrainian) -----
      function speak(text) {
        return new Promise((resolve) => {
          if (!window.speechSynthesis) {
            console.warn('Speech synthesis not supported');
            resolve();
            return;
          }
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'uk-UA';
          utterance.rate = 0.9;
          utterance.pitch = 1.1;
          // Try to pick a Ukrainian voice
          const voices = speechSynthesis.getVoices();
          const ukVoice = voices.find(v => v.lang.startsWith('uk'));
          if (ukVoice) utterance.voice = ukVoice;
          utterance.onend = resolve;
          utterance.onerror = resolve;
          speechSynthesis.speak(utterance);
        });
      }

      // Preload voices
      if (window.speechSynthesis) {
        speechSynthesis.onvoiceschanged = () => {};
      }

      // ----- Finger counting from landmarks -----
      function countFingers(landmarks) {
        // Indices: tip, pip (or ip for thumb)
        const fingers = [
          { tip: 4, pip: 3 },  // thumb
          { tip: 8, pip: 6 },  // index
          { tip: 12, pip: 10 }, // middle
          { tip: 16, pip: 14 }, // ring
          { tip: 20, pip: 18 }  // pinky
        ];
        let count = 0;
        for (const f of fingers) {
          // finger is extended if tip is above pip (y coordinate smaller)
          if (landmarks[f.tip].y < landmarks[f.pip].y) {
            count++;
          }
        }
        return count;
      }

      // ----- Hand detection loop -----
      function updateDetectedCount(rawCount) {
        // Smooth: add to buffer, get mode
        countBuffer.push(rawCount);
        if (countBuffer.length > BUFFER_SIZE) countBuffer.shift();
        // Mode calculation
        const freq = {};
        let maxFreq = 0, mode = rawCount;
        countBuffer.forEach(c => {
          freq[c] = (freq[c] || 0) + 1;
          if (freq[c] > maxFreq) {
            maxFreq = freq[c];
            mode = c;
          }
        });
        smoothedCount = mode;
        lastDetectedCount = rawCount;
        // Update UI
        const handEmojis = ['✊','☝️','✌️','🤟','🖖','🖐️'];
        detectedDisplay.textContent = `${handEmojis[smoothedCount] || '🙌'} ${smoothedCount}`;
      }

      function onFrame() {
        if (!handLandmarker || !video.readyState || video.readyState < 2) {
          requestAnimationFrame(onFrame);
          return;
        }
        const startTimeMs = performance.now();
        const results = handLandmarker.detectForVideo(video, startTimeMs);
        if (results.landmarks && results.landmarks.length > 0) {
          // Use first hand only
          const landmarks = results.landmarks[0];
          const count = countFingers(landmarks);
          updateDetectedCount(count);
        } else {
          updateDetectedCount(0);
        }
        requestAnimationFrame(onFrame);
      }

      // ----- Game logic -----
      async function startNewRound() {
        if (attempts >= MAX_ATTEMPTS || !gameActive) return;
        roundInProgress = true;
        // Generate random target 1-5, but ensure it's different from previous? No, random
        targetNumber = Math.floor(Math.random() * 5) + 1;
        targetDisplay.textContent = targetNumber;

        // Speak target
        messageBox.textContent = `🎤 Слухай уважно...`;
        playStartSound();
        const numberWords = ['нуль','один','два','три','чотири','п’ять'];
        await speak(`Покажи ${numberWords[targetNumber]} пальчики!`);

        // Wait a moment then start detection period
        messageBox.textContent = `🤔 Покажи ${targetNumber} пальчики!`;
        // Clear buffer
        countBuffer = [];
        smoothedCount = 0;

        // Set a 3-second timer to evaluate
        if (evaluationTimer) clearTimeout(evaluationTimer);
        evaluationTimer = setTimeout(evaluateAnswer, 3500);
      }

      function evaluateAnswer() {
        if (!roundInProgress) return;
        roundInProgress = false;
        const correct = (smoothedCount === targetNumber);
        attempts++;
        attemptsLeftSpan.textContent = MAX_ATTEMPTS - attempts;

        if (correct) {
          score++;
          scoreSpan.textContent = score;
          messageBox.textContent = `✅ Правильно! ${targetNumber} пальчики! 🎉`;
          playSuccessSound();
          createFireworks();
          // stop fireworks after 2 sec
          setTimeout(stopFireworks, 2000);
        } else {
          messageBox.textContent = `😊 Ой, це ${smoothedCount}, а треба ${targetNumber}. Нічого!`;
          playErrorSound();
        }

        // Wait a bit then next round or end
        setTimeout(() => {
          if (attempts >= MAX_ATTEMPTS) {
            endGame();
          } else {
            startNewRound();
          }
        }, 2500);
      }

      function endGame() {
        gameActive = false;
        roundInProgress = false;
        if (evaluationTimer) clearTimeout(evaluationTimer);
        targetDisplay.textContent = '🏆';
        messageBox.innerHTML = `🎯 Гра закінчена!<br>Ти показав правильно <b>${score}</b> з ${MAX_ATTEMPTS}!<br>${score >= 8 ? '🌟 Супер! Ти молодець!' : score >= 5 ? '👍 Гарна спроба!' : '💪 Спробуй ще раз!'}`;
        scoreSpan.textContent = score;
        attemptsLeftSpan.textContent = '0';
        // Big celebration if high score
        if (score >= 7) {
          createFireworks();
          setTimeout(stopFireworks, 4000);
          playSuccessSound();
          setTimeout(playSuccessSound, 300);
        }
        // Show restart button indirectly via a message, but we can just restart automatically after a delay or add a button
        setTimeout(() => {
          messageBox.innerHTML += '<br><button onclick="location.reload()">🔄 Грати знову</button>';
        }, 3000);
      }

      async function initGame() {
        // Initialize camera
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } });
          video.srcObject = stream;
          await video.play();
        } catch (err) {
          messageBox.textContent = '❌ Потрібен доступ до камери!';
          console.error(err);
          return;
        }

        // Initialize MediaPipe HandLandmarker
        try {
          const { HandLandmarker, FilesetResolver } = window;
          const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
          );
          handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
              delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: 1
          });
          console.log('HandLandmarker loaded');
        } catch (err) {
          messageBox.textContent = '❌ Помилка завантаження моделі!';
          console.error(err);
          return;
        }

        // Start detection loop
        requestAnimationFrame(onFrame);

        // Start game
        gameActive = true;
        attempts = 0;
        score = 0;
        scoreSpan.textContent = '0';
        attemptsLeftSpan.textContent = MAX_ATTEMPTS;
        messageBox.textContent = '👋 Давай порахуємо пальчики!';
        targetDisplay.textContent = '?';
        await speak('Привіт! Будемо вчитися рахувати до п’яти. Показуй пальчики!');
        startNewRound();
      }

      // Start everything when page loads
      window.addEventListener('load', () => {
        // Small delay to let DOM settle
        setTimeout(initGame, 500);
      });

    })();
  </script>
</body>
</html>
