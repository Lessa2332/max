<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Лічимо пальчики! 🌟</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #1a0033; font-family: 'Nunito', sans-serif; }

        #video {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; transform: scaleX(-1);
        }
        #canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* === Зірочки-нагороди === */
        #stars-bar {
            position: absolute; top: 16px; right: 16px;
            z-index: 150; display: flex; gap: 8px;
        }
        .star-icon {
            font-size: 2.4rem; opacity: 0.25;
            transition: all 0.4s cubic-bezier(.68,-0.55,.27,1.55);
        }
        .star-icon.earned { opacity: 1; filter: drop-shadow(0 0 12px #FFD700); transform: scale(1.2); }

        /* === Статус підказки === */
        #status-box {
            position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 88%; max-width: 480px;
            background: rgba(255,255,255,0.92);
            border-radius: 32px; padding: 22px 28px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            text-align: center;
        }
        #status-emoji {
            font-size: 3.2rem; line-height: 1; margin-bottom: 8px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        #status-text {
            font-size: 1.55rem; font-weight: 900; color: #1a0033;
            line-height: 1.3;
        }

        /* === Мітка пальців над рукою === */
        #hand-bubble {
            position: absolute; z-index: 1000;
            background: #FF3D7F; color: #fff;
            border-radius: 50%; width: 80px; height: 80px;
            display: none; align-items: center; justify-content: center;
            font-size: 2.6rem; font-weight: 900;
            box-shadow: 0 4px 20px rgba(255,61,127,0.7);
            transform: translate(-50%, -50%);
            border: 4px solid #fff;
            transition: background 0.3s;
        }
        #hand-bubble.correct { background: #00C170; box-shadow: 0 4px 20px rgba(0,193,112,0.8); }

        /* === Початковий екран === */
        #start-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: linear-gradient(160deg, #1a0033 0%, #3d0066 50%, #1a0033 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 24px;
        }
        #start-title { font-size: 3rem; font-weight: 900; color: #fff; text-align: center; line-height: 1.2; }
        #start-subtitle { font-size: 1.4rem; color: rgba(255,255,255,0.7); text-align: center; padding: 0 20px; }
        #start-fingers { font-size: 5rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

        #btn-start {
            background: #FFD700; color: #1a0033; border: none;
            padding: 22px 56px; border-radius: 24px;
            font-size: 2rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 0 #b39700, 0 12px 30px rgba(255,215,0,0.5);
            font-family: 'Nunito', sans-serif;
            transform: translateY(0);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        #btn-start:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b39700;
        }

        /* === Конфеті-вибух === */
        .confetti-piece {
            position: fixed; width: 14px; height: 14px;
            border-radius: 3px; z-index: 3000;
            animation: confetti-fall 1.4s forwards;
            pointer-events: none;
        }
        @keyframes confetti-fall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
        }

        /* === Екран перемоги === */
        #win-screen {
            position: fixed; inset: 0; z-index: 2500;
            background: rgba(26,0,51,0.95);
            display: none; flex-direction: column;
            align-items: center; justify-content: center; gap: 20px;
        }
        #win-screen h1 { font-size: 3.5rem; color: #FFD700; text-align: center; }
        #win-screen p  { font-size: 1.8rem; color: #fff; text-align: center; padding: 0 20px; }
        #btn-restart {
            background: #FF3D7F; color: #fff; border: none;
            padding: 20px 48px; border-radius: 20px;
            font-size: 1.6rem; font-weight: 900; cursor: pointer;
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>
<body>

    <!-- Зірочки прогресу -->
    <div id="stars-bar">
        <span class="star-icon" id="s0">⭐</span>
        <span class="star-icon" id="s1">⭐</span>
        <span class="star-icon" id="s2">⭐</span>
        <span class="star-icon" id="s3">⭐</span>
        <span class="star-icon" id="s4">⭐</span>
    </div>

    <!-- Підказка пальців -->
    <div id="hand-bubble">0</div>

    <!-- Статус внизу -->
    <div id="status-box">
        <div id="status-emoji">🤔</div>
        <div id="status-text">Завантаження...</div>
    </div>

    <!-- Початковий екран -->
    <div id="start-screen">
        <div id="start-fingers">🖐️✋👋</div>
        <div id="start-title">Лічимо<br>пальчики!</div>
        <div id="start-subtitle">Показуй пальчики на камеру — гра сама їх порахує! 🎉</div>
        <div style="font-size:1rem; color:rgba(255,255,255,0.4); margin-top:-10px; text-align:center; padding:0 20px;">👌 Секрет: зроби жест ОК!</div>
        <button id="btn-start">▶ ГРАТИ!</button>
    </div>

    <!-- Екран перемоги -->
    <div id="win-screen">
        <div style="font-size:5rem">🏆🎉🌟</div>
        <h1>УРА! ТИ МОЛОДЕЦЬ!</h1>
        <p>Ти навчився рахувати до 5!<br>Ти справжній розумник! 🧠</p>
        <button id="btn-restart">Грати ще раз!</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video       = document.getElementById('video');
        const statusEmoji = document.getElementById('status-emoji');
        const statusText  = document.getElementById('status-text');
        const handBubble  = document.getElementById('hand-bubble');
        const winScreen   = document.getElementById('win-screen');

        let handLandmarker, scene, camera, renderer, masterGroup, ring;
        let currentTarget = 1;
        let score = 0;
        let isProcessing = false;
        let countBuffer = [];
        let successTimeout = null;

        // --- Секретний жест ---
        let secretCooldown = false;
        let secretBuffer = [];  // буфер для стабілізації жесту

        // -----------------------------------------------
        //  УРОКИ — прості фрази для 3-річних
        // -----------------------------------------------
        const lessons = [
            { num: 1, emoji: "☝️", msg: "Покажи ОДИН пальчик!",   praise: "Чудово! Це ОдИН! Так тримати!" },
            { num: 2, emoji: "✌️", msg: "Тепер покажи ДВА!",       praise: "Ура! Два пальчики! Ти молодець!" },
            { num: 3, emoji: "🤟", msg: "Покажи ТРИ пальчики!",    praise: "Вау! Три! Ти такий розумний!" },
            { num: 4, emoji: "🖖", msg: "А тепер ЧОТИРИ!",          praise: "О так! Чотири! Неймовірно!" },
            { num: 5, emoji: "✋", msg: "Покажи всі П'ЯТЬ!",        praise: "П'ять! П'ять! Ти супергерой!" },
        ];

        // -----------------------------------------------
        //  Озвучення — повільно й радісно
        // -----------------------------------------------
        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'uk-UA';
            u.rate = 0.8;   // повільніше для малюка
            u.pitch = 1.3;  // трохи вище — веселіший тон
            u.volume = 1;
            if (callback) u.onend = callback;
            window.speechSynthesis.speak(u);
        }

        // -----------------------------------------------
        //  Конфеті
        // -----------------------------------------------
        function spawnConfetti() {
            const colors = ['#FFD700','#FF3D7F','#00C170','#3DAAFF','#FF8C00','#ffffff'];
            for (let i = 0; i < 50; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '-20px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.animationDelay = Math.random() * 0.8 + 's';
                el.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2200);
            }
        }

        // -----------------------------------------------
        //  AI — розпізнавання руки
        // -----------------------------------------------
        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            startLesson();
        }

        function startLesson() {
            if (score >= lessons.length) {
                showWin();
                return;
            }
            const lesson = lessons[score];
            currentTarget = lesson.num;
            statusEmoji.textContent = lesson.emoji;
            statusText.textContent  = lesson.msg;
            countBuffer = [];
            isProcessing = false;
            speak(lesson.msg);
        }

        function showWin() {
            winScreen.style.display = 'flex';
            spawnConfetti();
            speak("Ура! Ти навчився рахувати до п'яти! Ти справжній розумник!");
        }

        document.getElementById('btn-restart').onclick = () => {
            winScreen.style.display = 'none';
            score = 0;
            document.querySelectorAll('.star-icon').forEach(s => s.classList.remove('earned'));
            startLesson();
        };

        // -----------------------------------------------
        //  Three.js — AR-кільце
        // -----------------------------------------------
        function setupScene() {
            scene    = new THREE.Scene();
            camera   = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            masterGroup = new THREE.Group();

            // Кільце
            ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.5, 0.035, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFD700, emissiveIntensity: 2 })
            );
            masterGroup.add(ring);

            // Маленькі кульки навколо кільця
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const ball = new THREE.Mesh(
                    new THREE.SphereGeometry(0.07, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xFF3D7F, emissive: 0xFF3D7F, emissiveIntensity: 2 })
                );
                ball.position.set(Math.cos(angle) * 0.5, Math.sin(angle) * 0.5, 0);
                masterGroup.add(ball);
            }

            scene.add(masterGroup);
            scene.add(new THREE.AmbientLight(0xffffff, 2));
            camera.position.z = 3;

            masterGroup.visible = false;
        }

        // -----------------------------------------------
        //  Розпізнавання жесту ОК 👌
        //  Великий + вказівний торкаються (кільце),
        //  решта трьох пальців — прямі
        // -----------------------------------------------
        function isOkGesture(lm) {
            if (!lm) return false;

            // Великий і вказівний близько один до одного (торкаються)
            const thumbTip = lm[4];
            const indexTip = lm[8];
            const dx = thumbTip.x - indexTip.x;
            const dy = thumbTip.y - indexTip.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const touching = dist < 0.07;

            // Середній, безіменний, мізинець — витягнуті вгору
            const middleUp = lm[12].y < lm[10].y;
            const ringUp   = lm[16].y < lm[14].y;
            const pinkyUp  = lm[20].y < lm[18].y;

            return touching && middleUp && ringUp && pinkyUp;
        }

        // -----------------------------------------------
        //  Підрахунок пальців
        // -----------------------------------------------
        function countFingers(landmarks) {
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            let count = 0;

            tips.forEach((tip, i) => {
                if (landmarks[tip].y < landmarks[pips[i]].y) count++;
            });

            // Великий палець
            const thumbTip  = landmarks[4];
            const thumbBase = landmarks[17];
            if (Math.abs(thumbTip.x - thumbBase.x) > 0.15) count++;

            return count;
        }

        // -----------------------------------------------
        //  Головний цикл
        // -----------------------------------------------
        function animate() {
            requestAnimationFrame(animate);

            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());

                if (res.landmarks?.[0]) {
                    const hand = res.landmarks[0];
                    const raw  = countFingers(hand);

                    // --- Перевірка секретного жесту ОК 👌 (одна рука) ---
                    const okGesture = isOkGesture(res.landmarks[0]);
                    secretBuffer.push(okGesture ? 1 : 0);
                    if (secretBuffer.length > 15) secretBuffer.shift();
                    const secretStable = secretBuffer.filter(Boolean).length >= 12;

                    if (secretStable && !secretCooldown) {
                        secretCooldown = true;
                        secretBuffer = [];
                        triggerSecretWord();
                        setTimeout(() => { secretCooldown = false; }, 4000);
                    }

                    countBuffer.push(raw);
                    if (countBuffer.length > 12) countBuffer.shift();
                    const smooth = Math.round(countBuffer.reduce((a, b) => a + b, 0) / countBuffer.length);

                    // AR-кільце за зап'ястям
                    const wrist = hand[0];
                    masterGroup.position.x = (0.5 - wrist.x) * 4;
                    masterGroup.position.y = (0.5 - wrist.y) * 3;
                    masterGroup.visible    = true;
                    ring.rotation.y += 0.04;
                    ring.rotation.z += 0.01;

                    // Бульбашка з числом
                    handBubble.style.display = 'flex';
                    handBubble.style.left    = `${(1 - wrist.x) * 100}%`;
                    handBubble.style.top     = `${wrist.y * 100}%`;
                    handBubble.textContent   = smooth;

                    if (smooth === currentTarget && !isProcessing) {
                        handBubble.classList.add('correct');
                    } else {
                        handBubble.classList.remove('correct');
                    }

                    // Перевірка — тримає правильно 0.8 сек
                    if (!isProcessing && smooth === currentTarget) {
                        if (!successTimeout) {
                            successTimeout = setTimeout(() => {
                                isProcessing = true;
                                handleSuccess();
                            }, 800);
                        }
                    } else {
                        clearTimeout(successTimeout);
                        successTimeout = null;
                    }

                } else {
                    masterGroup.visible = false;
                    handBubble.style.display = 'none';
                    clearTimeout(successTimeout);
                    successTimeout = null;
                }
            }

            renderer.render(scene, camera);
        }

        // -----------------------------------------------
        //  Секретне слово! 🔺
        // -----------------------------------------------
        function triggerSecretWord() {
            spawnConfetti();
            speak("Знак!");

            // Показуємо великий трикутник на екрані
            const popup = document.createElement('div');
            popup.id = 'secret-popup';
            popup.innerHTML = `<div style="font-size:6rem">🔺</div><div style="font-size:3.5rem;font-weight:900;color:#fff;font-family:Nunito,sans-serif;margin-top:10px">ЗНАК!</div>`;
            popup.style.cssText = `
                position:fixed; inset:0; z-index:4000;
                display:flex; flex-direction:column;
                align-items:center; justify-content:center;
                background:rgba(255,61,127,0.85);
                animation: secret-in 0.3s ease;
            `;
            document.body.appendChild(popup);

            // Додаємо анімацію
            const style = document.createElement('style');
            style.textContent = `@keyframes secret-in { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }`;
            document.head.appendChild(style);

            setTimeout(() => {
                popup.style.transition = 'opacity 0.5s';
                popup.style.opacity = '0';
                setTimeout(() => popup.remove(), 500);
            }, 2000);
        }

        // -----------------------------------------------
        //  Успіх!
        // -----------------------------------------------
        function handleSuccess() {
            // Кільце зеленіє
            ring.material.color.setHex(0x00C170);
            ring.material.emissive.setHex(0x00C170);

            // Зірочка
            document.getElementById(`s${score}`).classList.add('earned');

            spawnConfetti();

            speak(lessons[score].praise, () => {
                score++;
                setTimeout(() => {
                    ring.material.color.setHex(0xFFD700);
                    ring.material.emissive.setHex(0xFFD700);
                    handBubble.classList.remove('correct');
                    startLesson();
                }, 600);
            });
        }

        // -----------------------------------------------
        //  Старт
        // -----------------------------------------------
        document.getElementById('btn-start').onclick = async () => {
            document.getElementById('start-screen').style.display = 'none';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
            } catch (e) {
                alert('Потрібен дозвіл на камеру! 📸');
                return;
            }

            setupScene();
            animate();

            statusEmoji.textContent = '⏳';
            statusText.textContent  = 'Завантажуємо гру...';

            await initAI();
        };

        window.addEventListener('resize', () => {
            if (renderer) {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }
        });
    </script>
</body>
</html>
