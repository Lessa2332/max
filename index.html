<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Лічимо пальчики та вчимо знаки! 🚗</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #1a0033; font-family: 'Nunito', sans-serif; }

        #video {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; transform: scaleX(-1);
        }
        #canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* === Зірочки прогресу === */
        #stars-bar {
            position: absolute; top: 16px; right: 16px;
            z-index: 150; display: flex; gap: 8px;
        }
        .star-icon {
            font-size: 2.4rem; opacity: 0.25;
            transition: all 0.4s cubic-bezier(.68,-0.55,.27,1.55);
        }
        .star-icon.earned { opacity: 1; filter: drop-shadow(0 0 12px #FFD700); transform: scale(1.2); }

        /* === Дорожній знак (спливаюче вікно) === */
        #sign-container {
            position: fixed; inset: 0; z-index: 2000;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6);
            pointer-events: none;
        }
        .sign-card {
            background: white; padding: 20px; border-radius: 40px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: sign-zoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .sign-image {
            width: 280px; height: 280px;
            object-fit: contain; border-radius: 15px;
        }
        @keyframes sign-zoom {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* === Статус внизу === */
        #status-box {
            position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 88%; max-width: 480px;
            background: rgba(255,255,255,0.95);
            border-radius: 32px; padding: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            text-align: center;
        }
        #status-text { font-size: 1.5rem; font-weight: 900; color: #1a0033; }

        /* === Бульбашка над рукою === */
        #hand-bubble {
            position: absolute; z-index: 1000;
            background: #FF3D7F; color: #fff;
            border-radius: 50%; width: 80px; height: 80px;
            display: none; align-items: center; justify-content: center;
            font-size: 2.6rem; font-weight: 900;
            transform: translate(-50%, -50%);
            border: 4px solid #fff;
        }
        #hand-bubble.correct { background: #00C170; }

        /* === Екрани === */
        #start-screen, #win-screen {
            position: fixed; inset: 0; z-index: 3000;
            background: radial-gradient(circle, #3d0066, #1a0033);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            color: white; text-align: center;
        }
        button {
            background: #FFD700; color: #1a0033; border: none;
            padding: 20px 50px; border-radius: 25px;
            font-size: 1.8rem; font-weight: 900; cursor: pointer;
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>
<body>

    <div id="stars-bar">
        <span class="star-icon" id="s0">⭐</span>
        <span class="star-icon" id="s1">⭐</span>
        <span class="star-icon" id="s2">⭐</span>
        <span class="star-icon" id="s3">⭐</span>
        <span class="star-icon" id="s4">⭐</span>
    </div>

    <div id="sign-container">
        <div class="sign-card">
            <img id="road-sign-img" class="sign-image" src="" alt="Дорожній знак">
            <p id="sign-title" style="color:#1a0033; font-size:1.5rem; margin-top:15px; font-weight:900;"></p>
        </div>
    </div>

    <div id="hand-bubble">0</div>

    <div id="status-box">
        <div id="status-text">Завантаження...</div>
    </div>

    <div id="start-screen">
        <div style="font-size: 6rem">🚕🚦</div>
        <h1>Вчимо дорожні знаки!</h1>
        <p>Рахуй пальчики та відкривай знаки</p>
        <button id="btn-start">ПОЇХАЛИ!</button>
    </div>

    <div id="win-screen" style="display:none;">
        <div style="font-size:6rem">🏆🥇</div>
        <h1>ТИ МОЛОДЕЦЬ!</h1>
        <p>Тепер ти знаєш правила дорожнього руху!</p>
        <button onclick="location.reload()">ГРАТИ ЩЕ РАЗ</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusText = document.getElementById('status-text');
        const handBubble = document.getElementById('hand-bubble');
        const signContainer = document.getElementById('sign-container');
        const signImg = document.getElementById('road-sign-img');
        const signTitle = document.getElementById('sign-title');

        let handLandmarker, scene, camera, renderer, ring, masterGroup;
        let score = 0;
        let currentTarget = 1;
        let isProcessing = false;
        let countBuffer = [];

        const lessons = [
            { num: 1, sign: "Пішохідний перехід", msg: "Покажи ОДИН пальчик!" },
            { num: 2, sign: "Обережно діти",      msg: "Покажи ДВА пальчики!" },
            { num: 3, sign: "Круговий рух",       msg: "Покажи ТРИ пальчики!" },
            { num: 4, sign: "Головна дорога",     msg: "Покажи ЧОТИРИ пальчики!" },
            { num: 5, sign: "Проїзд заборонено",  msg: "Покажи П'ЯТЬ пальчиків!" }
        ];

        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'uk-UA';
            u.rate = 0.85;
            if (callback) u.onend = callback;
            window.speechSynthesis.speak(u);
        }

        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            startLesson();
        }

        function startLesson() {
            if (score >= lessons.length) {
                document.getElementById('win-screen').style.display = 'flex';
                return;
            }
            currentTarget = lessons[score].num;
            statusText.textContent = lessons[score].msg;
            isProcessing = false;
            speak(lessons[score].msg);
        }

        function handleSuccess() {
            isProcessing = true;
            const lesson = lessons[score];

            // Показуємо зірочку
            document.getElementById(`s${score}`).classList.add('earned');
            ring.material.color.setHex(0x00C170);

            // Шлях до зображення: папка img/ та розширення .jpg
            signImg.src = `img/${score + 1}.jpg`;
            signTitle.textContent = lesson.sign;
            signContainer.style.display = 'flex';

            // Голосовий супровід назви знака
            speak(lesson.sign, () => {
                setTimeout(() => {
                    signContainer.style.display = 'none';
                    score++;
                    ring.material.color.setHex(0xFFD700);
                    startLesson();
                }, 2000);
            });
        }

        function countFingers(lm) {
            let count = 0;
            const tips = [8, 12, 16, 20], pips = [6, 10, 14, 18];
            tips.forEach((t, i) => { if (lm[t].y < lm[pips[i]].y) count++; });
            if (Math.abs(lm[4].x - lm[17].x) > 0.16) count++;
            return count;
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            masterGroup = new THREE.Group();
            ring = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.04, 16, 100), new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFD700, emissiveIntensity: 1 }));
            masterGroup.add(ring);
            scene.add(masterGroup, new THREE.AmbientLight(0xffffff, 2));
            camera.position.z = 3;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks?.[0]) {
                    const hand = res.landmarks[0];
                    const raw = countFingers(hand);
                    countBuffer.push(raw);
                    if (countBuffer.length > 10) countBuffer.shift();
                    const smooth = Math.round(countBuffer.reduce((a, b) => a + b, 0) / countBuffer.length);

                    const wrist = hand[0];
                    masterGroup.position.set((0.5 - wrist.x) * 4, (0.5 - wrist.y) * 3, 0);
                    masterGroup.visible = true;

                    handBubble.style.display = 'flex';
                    handBubble.style.left = `${(1 - wrist.x) * 100}%`;
                    handBubble.style.top = `${wrist.y * 100}%`;
                    handBubble.textContent = smooth;
                    
                    if (smooth === currentTarget && !isProcessing) {
                        handBubble.classList.add('correct');
                        handleSuccess();
                    } else if (smooth !== currentTarget) {
                        handBubble.classList.remove('correct');
                    }
                } else {
                    masterGroup.visible = false;
                    handBubble.style.display = 'none';
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('btn-start').onclick = async () => {
            document.getElementById('start-screen').style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                setupScene();
                animate();
                await initAI();
            } catch (e) {
                alert("Потрібен доступ до камери!");
            }
        };

        window.addEventListener('resize', () => {
            if (!renderer) return;
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
